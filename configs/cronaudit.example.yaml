# cronaudit example configuration

# Path to the syslog file to monitor for cron entries.
syslog_path: /var/log/syslog

# How often (in milliseconds) to poll the syslog file for new lines.
poll_interval_ms: 250

# Webhook URL to POST alerts to (e.g. Slack incoming webhook).
webhook_url: https://hooks.example.com/services/XXX/YYY/ZZZ

jobs:
  - name: backup
    schedule: "0 2 * * *"      # daily at 02:00
    command: /usr/local/bin/backup.sh
    timeout_seconds: 3600

  - name: cleanup
    schedule: "*/15 * * * *"   # every 15 minutes
    command: /usr/local/bin/cleanup.sh
    timeout_seconds: 120

  - name: report
    schedule: "30 8 * * 1"     # every Monday at 08:30
    command: /usr/local/bin/report.sh
    timeout_seconds: 600
